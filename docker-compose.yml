version: '3.8'
services:
  db:
    image: postgres:15
    container_name: school-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=schooldb
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: school-redis
    ports:
      - "6379:6379"