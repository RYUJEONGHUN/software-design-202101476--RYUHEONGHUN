spring:
  config:
    import: optional:file:./.env[.properties]
  profiles:
    active: local # 기본값 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      client:
        registration:
          google:
            scope:
              - email
              - profile

jwt:
  access-token-expiration: 3600000 # 1시간
  refresh-token-expiration: 604800000 # 7일